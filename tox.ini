[tox]
envlist =
    py38
    py39
;    py310
;    py311
;    py312
;    py313
    py314
    py315

requires =
    tox-uv>=1.28


[testenv]
deps =
    # parameterized
    pytest>=7.4.4
    pytest-cov>=4.1.0
    pytest_mock
commands =
    # python -c "import tests.tox_banner"
     py.test --cov-report term-missing --cov=bash2yaml --cov-fail-under=50
setenv =
    PYO3_USE_ABI3_FORWARD_COMPATIBILITY=1
extras = all