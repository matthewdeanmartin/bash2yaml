[tool.bash2yaml] # Configuration for bash2yaml
input_dir = "src" # Directory for source .yml and .sh files
output_dir = "out" # Directory for compiled GitLab CI files

format = true
verbose = true
quiet = false

[tool.bash2yaml.lint]
gitlab_url = "https://gitlab.com"
project_id = 123

[tool.bash2yaml.decompile]
input_folder = "src"
output_dir = "out"

[tool.bash2yaml.copy2local]
repo_url = "https://github.com/matthewdeanmartin/bash2yaml.git"
branch = "main"
source_dir = "compiled"
copy_dir = "templates"

[tool.bash2yaml.map.map]
"out/python" =["my_microservice/gitlab-scripts", "my_other/gitlab-scripts"]
